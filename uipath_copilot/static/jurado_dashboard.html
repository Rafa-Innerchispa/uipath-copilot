<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="ngrok-skip-browser-warning" content="true" />
  <title>PC Doctor — Maestro Case Copilot | InnerChispa</title>
  <style>
    :root {
      --bg: #0b1120; --surface: #1e293b; --surface2: #0f172a;
      --text: #e2e8f0; --muted: #94a3b8; --ok: #4ade80; --warn: #fbbf24; --bad: #f87171; --accent: #60a5fa;
      --term-bg: #020617;
    }
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.45; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    a { color: var(--accent); }
    .topbar { flex-shrink: 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: .75rem; padding: .65rem 1rem; background: var(--surface2); border-bottom: 1px solid #334155; }
    .brand h1 { font-size: 1rem; margin: 0; font-weight: 700; }
    .brand .sub { font-size: .75rem; color: var(--muted); margin: 0; }
    .toolbar { display: flex; gap: .5rem; }
    button { background: var(--accent); color: #0f172a; border: 0; border-radius: 8px; padding: .45rem .85rem; cursor: pointer; font-weight: 600; font-size: .82rem; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button.secondary { background: #334155; color: var(--text); }
    button.danger { background: #b91c1c; color: #fff; }
    button.ghost { background: transparent; border: 1px solid #475569; color: var(--text); }
    button.approve-btn { background: #16a34a; color: #fff; min-width: 7rem; }
    .err-banner, .running-banner { flex-shrink: 0; display: none; padding: .5rem 1rem; font-size: .82rem; }
    .err-banner.show { display: block; background: #450a0a; color: #fecaca; }
    .running-banner.show { display: block; background: #1e3a5f; color: #93c5fd; }
    .workspace { flex: 1; display: grid; grid-template-columns: 1fr min(440px, 42vw); min-height: 0; }
    @media (max-width: 960px) { .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } }
    .main { overflow: auto; padding: .75rem 1rem; min-height: 0; }
    .aside { display: flex; flex-direction: column; background: var(--surface2); border-left: 1px solid #334155; min-height: 0; overflow: hidden; }
    @media (max-width: 960px) { .aside { border-left: 0; border-top: 1px solid #334155; max-height: 55vh; } }
    .card { background: var(--surface); border: 1px solid #334155; border-radius: 10px; padding: .65rem; margin-bottom: .65rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: .45rem; margin-bottom: .65rem; }
    .card h3 { margin: 0 0 .25rem; font-size: .68rem; color: var(--muted); text-transform: uppercase; }
    .pill { display: inline-block; padding: .1rem .45rem; border-radius: 999px; font-size: .7rem; font-weight: 700; }
    .pill.ok { background: #14532d; color: var(--ok); }
    .pill.bad { background: #450a0a; color: var(--bad); }
    .pill.warn { background: #451a03; color: var(--warn); }
    .prog-wrap { min-width: 140px; }
    .prog-row { display: flex; align-items: center; gap: .35rem; margin-bottom: .15rem; }
    .prog-bar { flex: 1; height: 6px; background: #334155; border-radius: 999px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, #2563eb, var(--ok)); border-radius: 999px; transition: width .3s; }
    .prog-pct { font-size: .68rem; font-weight: 700; color: var(--accent); min-width: 2.2rem; }
    .prog-label { font-size: .65rem; color: var(--muted); display: block; }
    table { width: 100%; border-collapse: collapse; font-size: .78rem; }
    th, td { text-align: left; padding: .4rem .3rem; border-bottom: 1px solid #334155; }
    th { color: var(--muted); font-size: .68rem; text-transform: uppercase; }
    tr.sel { background: #33415588; outline: 1px solid var(--accent); }
    tr.approved-row { background: #14532d22; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #33415544; }
    .consult-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: .4rem; }
    .consult-btn { text-align: left; background: #0f172a; border: 1px solid #334155; color: var(--text); border-radius: 8px; padding: .5rem; cursor: pointer; font-size: .75rem; }
    .consult-btn:hover:not(:disabled) { border-color: var(--accent); }
    .consult-btn strong { display: block; font-size: .78rem; }
    .consult-btn span { color: var(--muted); font-size: .68rem; }
    /* Panel derecho: LOG arriba, detalle abajo */
    .term-panel { flex-shrink: 0; border-bottom: 1px solid #334155; background: var(--term-bg); display: flex; flex-direction: column; height: 200px; }
    .term-head { display: flex; justify-content: space-between; align-items: center; padding: .3rem .6rem; font-size: .7rem; color: var(--muted); background: #0f172a; }
    #terminal { flex: 1; overflow: auto; padding: .4rem .6rem; font-family: Consolas, monospace; font-size: .68rem; line-height: 1.4; color: #a5f3fc; }
    .line-ok { color: #86efac; } .line-err { color: #fca5a5; } .line-warn { color: #fde047; } .line-info { color: #93c5fd; }
    .detail-scroll { flex: 1; overflow: auto; padding: .65rem; min-height: 0; }
    .stages { display: flex; gap: .25rem; flex-wrap: wrap; margin: .4rem 0; }
    .stage { padding: .15rem .45rem; border-radius: 6px; background: #334155; font-size: .65rem; }
    .stage.done { background: #14532d; color: var(--ok); }
    .stage.current { outline: 2px solid var(--accent); }
    .stage.pending-hitl { outline: 2px solid var(--warn); }
    .approval-banner { display: none; padding: .6rem; border-radius: 8px; margin: .4rem 0; font-weight: 700; font-size: .8rem; }
    .approval-banner.show-approved { display: block; background: #14532d; color: var(--ok); border: 1px solid var(--ok); }
    .approval-banner.show-rejected { display: block; background: #450a0a; color: var(--bad); }
    .approval-banner.show-pending { display: block; background: #451a03; color: var(--warn); border: 1px solid var(--warn); }
    .report { white-space: pre-wrap; background: var(--term-bg); padding: .6rem; border-radius: 8px; font-size: .72rem; max-height: 220px; overflow: auto; border: 1px solid #1e293b; margin-top: .4rem; }
    .finding { display: block; margin: .2rem 0; font-size: .72rem; }
    textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: var(--text); border-radius: 8px; padding: .45rem; font-size: .78rem; margin-top: .4rem; }
    .detail-empty { color: var(--muted); font-size: .82rem; padding: .5rem 0; }
    .aside-title { margin: 0 0 .35rem; font-size: .85rem; font-weight: 700; }
    .hitl-actions { display: flex; gap: .5rem; margin: .5rem 0; flex-wrap: wrap; }
    .intro-compact { font-size: .78rem; color: var(--muted); margin-bottom: .5rem; }
    .platform-table { font-size: .72rem; width: 100%; }
    .platform-table td { vertical-align: top; padding: .35rem .25rem; }
    .platform-table .comp-name { font-weight: 600; color: var(--text); }
    .platform-table .comp-where { font-size: .65rem; color: var(--muted); }
    .platform-head { display: flex; justify-content: space-between; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: .4rem; }
    .platform-score { font-size: 1.1rem; font-weight: 800; color: var(--ok); }
    .demo-row { display: flex; gap: .35rem; flex-wrap: wrap; margin-top: .5rem; }
    .demo-row button { font-size: .68rem; padding: .3rem .55rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1 id="t-title">PC Doctor — Maestro Case Copilot</h1>
      <p class="sub"><a href="https://www.innerchispa.us" target="_blank">InnerChispa</a> · UiPath AgentHack 2026</p>
    </div>
    <div class="toolbar">
      <button type="button" class="ghost" id="btn-lang">EN</button>
      <button type="button" class="secondary" id="btn-refresh">Actualizar</button>
    </div>
  </header>
  <div class="err-banner" id="err-banner"></div>
  <div class="running-banner" id="running-banner"></div>

  <div class="workspace">
    <section class="main">
      <p class="intro-compact" id="intro-compact"></p>
      <div class="card">
        <h3 id="t-consult-h" style="text-transform:none;font-size:.8rem;color:var(--text)">Consultas operativas</h3>
        <div class="consult-grid" id="consult-grid"></div>
      </div>
      <div class="grid" id="status-grid"></div>
      <div class="card" id="platform-card">
        <div class="platform-head">
          <h3 id="t-platform-h" style="text-transform:none;font-size:.85rem;color:var(--text);margin:0">UiPath Platform Usage</h3>
          <span class="platform-score" id="platform-score-pct">—</span>
        </div>
        <p id="platform-pending" class="intro-compact" style="margin:0 0 .35rem;font-size:.72rem;color:var(--warn);display:none"></p>
        <p id="platform-intro" class="intro-compact" style="margin:0 0 .5rem"></p>
        <table class="platform-table"><tbody id="platform-body"></tbody></table>
        <p id="platform-verify-label" class="intro-compact" style="margin:.55rem 0 .35rem;font-size:.72rem;color:var(--muted)"></p>
        <div class="demo-row">
          <button type="button" class="secondary" id="btn-verify-all">Verificar 12/12</button>
          <button type="button" class="secondary" id="btn-demo-agent">Agent Builder</button>
          <button type="button" class="secondary" id="btn-demo-tests">Test Manager</button>
          <button type="button" class="secondary" id="btn-demo-du">Document UP</button>
          <button type="button" class="ghost" id="btn-demo-caseapp">Case App</button>
        </div>
      </div>
      <div class="card">
        <h3 id="t-cases-h">Casos operativos</h3>
        <table>
          <thead><tr>
            <th id="th-client">Cliente</th><th id="th-stage">Etapa</th><th id="th-stages">Progreso</th><th id="th-updated">Actualizado</th><th id="th-appr">Aprobación</th>
          </tr></thead>
          <tbody id="cases-body"></tbody>
        </table>
      </div>
    </section>

    <aside class="aside">
      <!-- LOG EN VIVO ARRIBA -->
      <div class="term-panel">
        <div class="term-head">
          <span id="t-term-label">Log de actividad en vivo</span>
          <span style="display:flex;gap:.25rem">
            <button type="button" class="ghost" id="btn-reset-demo" style="padding:.15rem .4rem;font-size:.65rem">Reset casos</button>
            <button type="button" class="ghost" id="btn-clear-term" style="padding:.15rem .4rem;font-size:.65rem">Limpiar log</button>
          </span>
        </div>
        <div id="terminal"></div>
      </div>
      <!-- DETALLE DEL CASO ABAJO -->
      <div class="detail-scroll">
        <h3 class="aside-title" id="t-detail-h">Detalle del caso</h3>
        <p id="detail-empty" class="detail-empty">Selecciona un caso en la tabla o ejecuta una consulta.</p>
        <div id="detail-content" style="display:none">
          <div id="approval-banner" class="approval-banner"></div>
          <div class="stages" id="m-stages"></div>
          <div id="m-meta"></div>
          <div id="m-public-links" style="font-size:.72rem;margin:.35rem 0"></div>
          <div id="m-findings"></div>
          <textarea id="m-comment" rows="2" placeholder="Comentario (opcional)"></textarea>
          <div class="hitl-actions">
            <button type="button" class="secondary" id="btn-continue-flow" style="display:none">Continuar flujo</button>
            <button type="button" class="approve-btn" id="btn-approve">Aprobar</button>
            <button type="button" class="danger" id="btn-reject">Rechazar</button>
          </div>
          <div class="report" id="m-report"></div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    const STAGES = ["Intake", "Investigation", "Remediation", "Approval"];
    const I18N = {

        demoCaseApp: "Case App — panel móvil",
      },
      en: {
        title: "PC Doctor — Maestro Case Copilot",
        introCompact: "Two real entry points to the same engine (MongoDB + Ollama): Start Job in UiPath Maestro, or operational consultation from here.",
        consultH: "Operational consultations (real MongoDB clients)",
        consultRun: "Run all 4 stages from the server",
        running: "Running 4 stages… wait 1–2 min. Watch the log above →",
        casesH: "Operational cases",
        client: "Client", stage: "Stage", progress: "Progress", updated: "Updated", appr: "Approval",
        status: "Status", blocked: "Blocked", complete: "Complete",
        bannerBlocked: "🛑 Flow stopped by real operational gate — review findings",
        pending: "Pending", detailH: "Case detail",
        detailEmpty: "Select a case in the table or run a consultation.",
        approve: "Approve", reject: "Reject", commentPh: "Comment (optional)",
        refresh: "Refresh", termLabel: "Live activity log", clear: "Clear log",
        resetDemo: "Reset cases", resetConfirm: "Delete ALL panel cases and start fresh? Type RESET next.",
        resetPrompt: "Type RESET to confirm:",
        resetOk: "Panel cleared — ready for a new Start Job",
        noCases: "No cases yet.",
        connErr: "Cannot reach API.",
        langBtn: "ES",
        bannerApproved: "✅ APPROVED — case closed",
        bannerRejected: "❌ REJECTED",
        bannerPending: "⏳ Pending approval — click Approve below",
        bannerIntakeOnly: "ℹ️ Intake only — not at Approval yet. Maestro must run Investigation → Remediation → Approval. Cannot approve here.",
        bannerMaestroWaiting: "⏸️ Maestro Cloud webhook received — server auto-completes Investigation → Remediation → Approval (1–2 min). For old stuck cases, click Continue flow.",
        bannerMaestroComplete: "✅ All 4 stages arrived from Maestro Cloud. Webhook + MongoDB + Ollama OK.",
        bannerMaestroBroken: "⚠️ Incomplete Maestro case (no client / case_id not substituted). Fix Case ID variable in API Workflow.",
        bannerMaestroOk: "✅ Maestro Cloud integration active — webhook OK, MongoDB + Ollama. Real case ID below.",
        maestroCloudLabel: "Maestro Cloud",
        continueFlow: "Continue flow",
        continuingFlow: "Completing pending stages… Ollama 1–2 min",
        continueOk: "Stages complete — check progress",
        approving: "Processing approval…",
        platformH: "UiPath Platform Usage — Community License",
        platformIntro: "Hackathon checklist: UiPath products integrated with live evidence on your server.",
        platformScoreHint: "products verified",
        platformPending: "Pending for 12/12:",
        platformVerifyAll: "Verify 12/12",
        platformVerifying: "Verifying integrations…",
        platformWhere: "Where",
        platformDemo: "Open",
        platformVerifyRow: "Live verification (real API)",
        demoAgent: "Agent Builder — classify intake",
        demoTests: "Test Manager — smoke + JUnit",
        demoDu: "Document UP — extraction API",
        demoCaseApp: "Case App — mobile panel",
      },
    };

    let lang = localStorage.getItem("pcd-lang") || "es";
    let selectedCase = null;
    let isRunning = false;
    let runningCaseId = null;
    let isDeciding = false;
    let casePollTimer = null;
    const seenActivity = new Set();

    function normalizeCase(c) {
      if (!c) return c;
      const out = { ...c };
      if (out.approval_status === "pending") out.approval_status = null;
      const notes = out.notes || (out.payload_snapshot && out.payload_snapshot.notes) || "";
      if (notes.includes("maestro_raw_case_id=")) {
        const m = notes.match(/maestro_raw_case_id=([^;]+)/);
        if (m) out.maestro_id_unsubstituted = out.maestro_id_unsubstituted || m[1].trim();
        out.integration_source = out.integration_source || "maestro_cloud";
      }
      if (notes.includes("source=maestro_cloud") || out.integration_source === "maestro_cloud") {
        out.integration_source = "maestro_cloud";
      }
      return out;
    }

    function isMaestroCloud(c) {
      c = normalizeCase(c);
      return c.integration_source === "maestro_cloud" || String(c.case_id || "").match(/^[0-9a-f-]{36}$/i);
    }

    function isBrokenClientName(name) {
      if (!name) return true;
      const s = String(name);
      return s.includes("{{") || s.includes("}}") || s.toLowerCase().includes("maestro_raw_case_id");
    }

    function displayClientCell(c) {
      c = normalizeCase(c);
      if (c.client_name && !isBrokenClientName(c.client_name)) return esc(c.client_name);
      if (String(c.case_id).includes("{{")) {
        return `<span style="color:var(--bad)">Maestro ⚠ ${esc(String(c.case_id).slice(0, 14))}</span>`;
      }
      if (c.integration_source === "maestro_cloud" || (c.maestro_id_unsubstituted && !c.client_name)) {
        return `<span class="pill ok">${t("maestroCloudLabel")} · ${esc(String(c.case_id).slice(0, 8))}…</span>`;
      }
      return `<span style="color:var(--muted)">${esc(String(c.case_id).slice(0, 8))}…</span>`;
    }

    function t(k) { return (I18N[lang] || I18N.es)[k] || k; }

    function apiBase() {
      const path = window.location.pathname;
      const i = path.indexOf("/dashboard");
      if (i > 0) return path.slice(0, i);
      if (path.startsWith("/uipath")) return path.startsWith("/uipath-copilot") ? "/uipath-copilot" : "/uipath";
      return "";
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
    }

    function termLog(level, source, msg) {
      const el = document.getElementById("terminal");
      const cls = level === "err" ? "line-err" : level === "ok" ? "line-ok" : level === "warn" ? "line-warn" : "line-info";
      const ts = new Date().toISOString().slice(11, 19);
      el.innerHTML += `<div class="${cls}">[${ts}] <b>${esc(source)}</b> ${esc(msg)}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    function formatDt(iso) {
      if (!iso) return "—";
      try {
        const d = new Date(iso);
        return d.toLocaleString(lang === "en" ? "en-GB" : "es-EC", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
      } catch (_) { return String(iso).slice(0, 16); }
    }

    function langQuery(extra = "") {
      const sep = extra.includes("?") ? "&" : (extra ? "?" : "?");
      return `${extra}${sep}lang=${lang}`;
    }

    async function apiFetch(path, opts = {}) {
      const silent = opts.silent;
      let url = apiBase() + path;
      if (!url.includes("lang=") && !opts.noLang) {
        url += (url.includes("?") ? "&" : "?") + "lang=" + lang;
      }
      if (!silent) termLog("info", "HTTP", `${(opts.method || "GET").toUpperCase()} ${path}`);
      const r = await fetch(url, {
        method: opts.method || "GET",
        headers: { "ngrok-skip-browser-warning": "true", Accept: "application/json", ...(opts.headers || {}) },
        body: opts.body,
        signal: opts.signal,
      });
      if (!r.ok) {
        const errBody = await r.text();
        if (!silent) termLog("err", "HTTP", `${r.status} ${path}`);
        throw new Error(`HTTP ${r.status}: ${errBody.slice(0, 80)}`);
      }
      const ct = r.headers.get("content-type") || "";
      const data = ct.includes("json") ? await r.json() : await r.text();
      if (!silent) termLog("ok", "HTTP", `${r.status} ${path}`);
      return data;
    }

    function applyLang() {
      document.documentElement.lang = lang;
      document.getElementById("t-title").textContent = t("title");
      document.getElementById("intro-compact").textContent = t("introCompact");
      document.getElementById("t-consult-h").textContent = t("consultH");
      document.getElementById("t-cases-h").textContent = t("casesH");
      document.getElementById("th-client").textContent = t("client");
      document.getElementById("th-stage").textContent = t("stage");
      document.getElementById("th-stages").textContent = t("progress");

      if (!path) return "#";

      const base = (publicBase || apiBase() || "").replace(/\/$/, "");
      return path.includes("{case_id}") && selectedCase

    function renderPlatformScorecard(score) {
      lastScorecard = score;
      const el = document.getElementById("platform-body");

      pct.textContent = `${score.score_pct}% — ${score.bonuses_met}/${score.bonuses_total} ${t("platformScoreHint")}`;
      const pendEl = document.getElementById("platform-pending");
      if (pendEl) {
        const pending = (score.bonuses || []).filter(b => !b.met);

        } else {
          pendEl.style.display = "none";

      }
      el.innerHTML = score.bonuses.map(b => {
        const label = lang === "en" ? (b.jury_en || b.name) : (b.jury_es || b.name);

        const pill = b.met ? "ok" : "warn";
        const st = b.met ? (lang === "en" ? "LIVE" : "ACTIVO") : (lang === "en" ? "PENDING" : "PENDIENTE");
        const ev = b.evidence || b.setup || "";

          <td style="width:28%"><span class="comp-name">${esc(b.name)}</span><br/><span class="comp-where">${esc(b.where || "")}</span></td>
          <td>${esc(label)}<br/><span class="comp-where">${esc(ev)}</span></td>
          <td style="width:12%"><span class="pill ${pill}">${st}</span></td>
          <td style="width:14%"><a href="${esc(url)}" target="_blank" rel="noopener">${t("platformDemo")}</a></td>
        </tr>`;
      }).join("");
    }

    function stopCasePoll() {
      if (casePollTimer) { clearInterval(casePollTimer); casePollTimer = null; }
    }

    function isFinalApproval(status) {
      return status === "approved" || status === "rejected";
    }

    function stageProgress(c) {
      c = normalizeCase(c);
      const completed = STAGES.filter(s => (c.stages_completed || []).includes(s));
      const pct = Math.round((completed.length / STAGES.length) * 100);
      const current = c.stage && !completed.includes(c.stage) ? c.stage : (completed[completed.length - 1] || c.stage || "—");
      return { pct, completed, current, label: completed.join(" → ") || "—" };
    }

    function renderProgressCell(c) {
      const p = stageProgress(c);
      return `<div class="prog-wrap">
        <div class="prog-row"><div class="prog-bar"><div class="prog-fill" style="width:${p.pct}%"></div></div><span class="prog-pct">${p.pct}%</span></div>
        <span class="prog-label">${esc(p.label)}${p.current && p.pct < 100 ? ` · → ${esc(p.current)}` : ""}</span>
      </div>`;
    }

    function canContinueFlow(c) {
      if (!c || isFinalApproval(c.approval_status)) return false;
      if (c.flow_blocked) return false;
      return !maestroProgressComplete(c);
    }

    function nextMaestroStage(c) {
      const done = new Set(c.stages_completed || []);
      for (const s of STAGES) {
        if (!done.has(s)) return s;
      }
      return null;
    }

    function maestroProgressComplete(c) {
      const done = new Set(c.stages_completed || []);
      return STAGES.every(s => done.has(s));
    }

    function canApprove(c) {
      if (!c || isFinalApproval(c.approval_status)) return false;
      // Solo aprobar en etapa Approval (HITL final), no Intake suelto de Maestro
      if (c.stage === "Approval" || (c.stages_completed || []).includes("Approval")) return true;
      if (c.flow_blocked) return false;
      return false;
    }

    function renderDetail(c) {
      c = normalizeCase(c);
      selectedCase = c;
      document.getElementById("detail-empty").style.display = "none";
      document.getElementById("detail-content").style.display = "block";
      const done = new Set(c.stages_completed || []);
      document.getElementById("m-stages").innerHTML = STAGES.map(s => {
        let cls = "stage";
        if (done.has(s)) cls += " done";
        if (c.stage === s && !isFinalApproval(c.approval_status)) cls += " current";
        if (s === "Approval" && canApprove(c)) cls += " pending-hitl";
        return `<span class="${cls}">${s}</span>`;
      }).join("");
      const clientLabel = (c.client_name && !isBrokenClientName(c.client_name))
        ? c.client_name
        : (c.integration_source === "maestro_cloud" ? t("maestroCloudLabel") : "—");
      document.getElementById("m-meta").innerHTML = `<p style="font-size:.75rem;color:var(--muted);margin:.3rem 0"><code>${esc(c.case_id)}</code><br/><strong>${esc(clientLabel)} · ${esc(String(c.case_id).slice(0, 8))}…</strong>${c.maestro_id_unsubstituted ? `<br/><span style="font-size:.65rem">UiPath envió <code>${esc(c.maestro_id_unsubstituted)}</code> → UUID del servidor arriba</span>` : ""}</p>`;
      document.getElementById("m-findings").innerHTML = (c.findings || []).slice(0, 6).map(f =>
        `<span class="finding"><span class="pill ${f.passed ? "ok" : "bad"}">${f.passed ? "OK" : "BLOCK"}</span> ${esc(f.gate)}</span>`
      ).join("");
      document.getElementById("m-report").textContent = c.report_markdown || c.analysis || "—";
      const banner = document.getElementById("approval-banner");
      banner.className = "approval-banner";
      if (c.approval_status === "approved") { banner.classList.add("show-approved"); banner.textContent = t("bannerApproved"); }
      else if (c.approval_status === "rejected") { banner.classList.add("show-rejected"); banner.textContent = t("bannerRejected"); }
      else if (c.flow_blocked) { banner.classList.add("show-pending"); banner.textContent = t("bannerBlocked") + (c.blocking_gate ? ` (${c.blocking_gate})` : ""); }
      else if (canApprove(c)) { banner.classList.add("show-pending"); banner.textContent = t("bannerPending"); }
      else if (c.integration_source === "maestro_cloud" && !String(c.case_id).includes("{{")) {
        if (maestroProgressComplete(c)) {
          banner.classList.add("show-approved");
          banner.textContent = t("bannerMaestroComplete") + ` · ${(c.stages_completed || []).join(" → ")}`;
        } else {
          const next = nextMaestroStage(c) || "Investigation";
          banner.classList.add("show-pending");
          banner.textContent = t("bannerMaestroWaiting").replace("{next}", next)
            + ` · ${(c.stages_completed || []).join(" → ") || c.stage}`;
        }
      }
      else if (String(c.case_id).includes("{{") || (!c.client_name && c.stage === "Intake" && !(c.stages_completed || []).includes("Approval") && c.integration_source !== "maestro_cloud")) {
        banner.classList.add("show-pending");
        banner.textContent = String(c.case_id).includes("{{") ? t("bannerMaestroBroken") : t("bannerIntakeOnly");
      }
      const busySameCase = isRunning && runningCaseId && c.case_id === runningCaseId;
      const locked = isFinalApproval(c.approval_status) || isDeciding || busySameCase;
      const btnA = document.getElementById("btn-approve");
      const btnR = document.getElementById("btn-reject");
      const btnC = document.getElementById("btn-continue-flow");
      const allow = canApprove(c) && !locked;
      const showContinue = canContinueFlow(c) && !locked && !isRunning;
      btnA.disabled = !allow;
      btnR.disabled = !allow;
      if (btnC) {
        btnC.style.display = showContinue ? "inline-block" : "none";
        btnC.disabled = !showContinue || isRunning;
      }
      btnA.title = allow ? "" : (busySameCase ? (lang === "en" ? "Wait for 4-stage run to finish" : "Espera a que termine el flujo de 4 etapas") : "");
      btnR.title = btnA.title;
      renderPublicLinks(c);
    }

    async function openCase(id, silent = false) {
      try {
        const c = normalizeCase(await apiFetch(`/api/v1/cases/${encodeURIComponent(id)}`, { silent }));
        renderDetail(c);
        if (!silent) termLog("info", "CASO", `${c.client_name || id.slice(0, 8)} · ${c.stage} · ${(c.stages_completed || []).join("→")}`);
        if (canApprove(c) && !isFinalApproval(c.approval_status)) startPendingPoll();
        else stopCasePoll();
        return c;
      } catch (e) {
        if (!silent) termLog("err", "CASO", String(e.message));
        throw e;
      }
    }

    async function decide(decision) {
      if (!selectedCase) {
        termLog("warn", "HITL", lang === "en" ? "Select a case first" : "Selecciona un caso primero");
        showError(lang === "en" ? "Select a case in the table" : "Selecciona un caso en la tabla");
        return;
      }
      if (isDeciding) {
        termLog("warn", "HITL", lang === "en" ? "Approval already in progress" : "Aprobación en curso");
        return;
      }
      if (isRunning && runningCaseId && selectedCase.case_id === runningCaseId) {
        termLog("warn", "HITL", lang === "en" ? "Wait for the 4-stage run to finish" : "Espera a que termine el flujo de 4 etapas");
        showError(lang === "en" ? "Wait for consultation to finish" : "Espera a que termine la consulta");
        return;
      }
      selectedCase = normalizeCase(selectedCase);
      if (!canApprove(selectedCase)) {
        termLog("warn", "HITL", lang === "en" ? "Case not ready for approval" : "Caso no listo para aprobación");
        showError(lang === "en" ? "Case not ready for approval" : "Caso no listo para aprobación");
        return;
      }
      isDeciding = true;
      const btnA = document.getElementById("btn-approve");
      const btnR = document.getElementById("btn-reject");
      const origA = btnA.textContent;
      btnA.disabled = true;
      btnR.disabled = true;
      btnA.textContent = t("approving");
      stopCasePoll();
      const caseId = selectedCase.case_id;
      const comment = document.getElementById("m-comment").value || "";
      try {
        termLog("info", "HITL", `${decision} → case ${caseId.slice(0, 8)}…`);
        await apiFetch(`/api/v1/cases/${encodeURIComponent(caseId)}/human-decision?lang=${lang}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ decision, comment }),
          noLang: true,
        });
        termLog("ok", lang === "en" ? "APPROVAL" : "APROBACIÓN", `${decision.toUpperCase()} · ${selectedCase.client_name || caseId.slice(0, 8)}`);
        selectedCase = normalizeCase(await openCase(caseId));
        stopCasePoll();
        await refreshCasesTable(true);
      } catch (e) {
        termLog("err", "HITL", String(e.message));
        showError(String(e.message));
      } finally {
        isDeciding = false;
        btnA.textContent = origA;
        if (selectedCase) renderDetail(selectedCase);
      }
    }

    function consultTitle(c) {
      return lang === "es" ? (c.title_es || c.title_en) : (c.title_en || c.title_es);
    }

    function renderConsultations(list) {
      const grid = document.getElementById("consult-grid");
      grid.innerHTML = list.map(c => {
        const hint = lang === "es" ? (c.flow_hint_es || "") : (c.flow_hint_en || "");

        <button type="button" class="consult-btn" data-id="${esc(c.id)}" ${isRunning ? "disabled" : ""}>
          <strong>${esc(lang === "es" ? (c.title_es || c.title_en) : (c.title_en || c.title_es))}</strong>
          <span>${esc(c.client_name || "")}</span>
          ${hint ? `<span style="color:var(--warn);font-size:.65rem;display:block;margin-top:.25rem">${esc(hint)}</span>` : ""}
        </button>`;
      }).join("");
      grid.querySelectorAll(".consult-btn").forEach(btn => {
        btn.onclick = () => runFullConsultation(btn.dataset.id);

    async function runFullConsultation(id) {
      if (isRunning) return;
      isRunning = true;
      runningCaseId = null;
      stopCasePoll();
      document.getElementById("running-banner").textContent = t("running");
      document.getElementById("running-banner").classList.add("show");
      document.querySelectorAll(".consult-btn").forEach(b => b.disabled = true);
      termLog("info", "CONSULTA", `Inicio · ${id}`);
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 300000);
        const r = await apiFetch(`/api/v1/consultations/${encodeURIComponent(id)}/run-full`, {
          method: "POST",
          noLang: false,
          signal: ctrl.signal,
        });
        clearTimeout(timer);
        termLog("ok", "CONSULTA", r.flow_blocked
          ? (lang === "en" ? `BLOCKED · ${r.blocking_gate || "gate"}` : `BLOQUEADO · ${r.blocking_gate || "gate"}`)
          : (lang === "en" ? `4 stages OK · ${r.client_name || id}` : `4 etapas OK · ${r.client_name || id}`));
        if (r.case_id) {
          runningCaseId = r.case_id;
          await openCase(r.case_id);
          await refreshCasesTable(true);
        }
      } catch (e) {
        termLog("err", "CONSULTA", String(e.message));
        showError(String(e.message));
      } finally {
        isRunning = false;
        runningCaseId = null;
        document.getElementById("running-banner").classList.remove("show");
        document.querySelectorAll(".consult-btn").forEach(b => b.disabled = false);
        if (selectedCase) renderDetail(normalizeCase(selectedCase));
      }
    }

    function renderCases(cases) {
      const tbody = document.getElementById("cases-body");
      if (!cases.length) { tbody.innerHTML = `<tr><td colspan="5">${t("noCases")}</td></tr>`; return; }
      tbody.innerHTML = cases.map(c => {
        const appr = c.approval_status === "approved" || c.approval_status === "rejected"
          ? `<span class="pill ${c.approval_status === "approved" ? "ok" : "bad"}">${c.approval_status}</span>`
          : c.flow_blocked
            ? `<span class="pill warn">${t("blocked")}</span>`
            : (c.needs_human || c.stage === "Approval" || c.approval_status === "pending"
              ? `<span class="pill warn">${t("pending")}</span>` : "—");
        const clientCell = displayClientCell(c);
        const sel = selectedCase && selectedCase.case_id === c.case_id ? "sel" : "";
        return `<tr class="${sel} ${c.approval_status === "approved" ? "approved-row" : ""}" data-id="${esc(c.case_id)}">
          <td>${typeof clientCell === "string" && clientCell.startsWith("<") ? clientCell : esc(clientCell)}</td>
          <td>${esc(c.stage || "—")}</td>
          <td>${renderProgressCell(c)}</td>
          <td style="font-size:.68rem;color:var(--muted)">${formatDt(c.updated_at || c.created_at)}</td>
          <td>${appr}</td></tr>`;
      }).join("");
      tbody.querySelectorAll("tr[data-id]").forEach(tr => {
        tr.onclick = () => { stopCasePoll(); openCase(tr.dataset.id); };
      });
    }

    async function refreshCasesTable(silent = false) {
      const data = await apiFetch("/api/v1/cases?limit=50", { silent });
      renderCases(data.cases || []);
    }

    function renderStatus(st, score) {
      const m = st.uipath_maestro || {};
      const mongo = st.mongodb || {};
      document.getElementById("status-grid").innerHTML = [
        ["Maestro OAuth", m.reachable ? "OK" : "ERR", m.reachable ? "ok" : "bad"],
        ["MongoDB", mongo.ok ? `${mongo.clients} cli` : "ERR", mongo.ok ? "ok" : "bad"],
        ["Ollama", st.ollama?.ok ? "OK" : "OFF", st.ollama?.ok ? "ok" : "warn"],
        ["Bonus", score ? `${score.score_pct}%` : "—", "ok"],
      ].map(([t, v, c]) => `<div class="card"><h3>${t}</h3><span class="pill ${c}">${v}</span></div>`).join("");
    }

    async function load() {
      hideError();
      try {
        const [st, cases, score, cons] = await Promise.all([
          apiFetch("/status", { silent: true }),
          apiFetch("/api/v1/cases?limit=50", { silent: true }),
          apiFetch("/api/v1/platform-scorecard", { silent: true }).catch(() => null),
          apiFetch("/api/v1/consultations", { silent: true }).catch(() => ({ consultations: [] })),
        ]);
        renderConsultations(cons.consultations || []);
        renderStatus(st, score);
        renderPlatformScorecard(score);
        renderCases(cases.cases || []);
        if (selectedCase) {
          const fresh = (cases.cases || []).find(x => x.case_id === selectedCase.case_id);
          if (fresh) renderDetail(normalizeCase({ ...selectedCase, ...fresh }));
        }
      } catch (e) {
        showError(t("connErr"));
      }
    }

    async function pollActivity() {
      if (isDeciding || isRunning) return;
      try {
        const data = await apiFetch("/api/v1/activity?limit=25", { silent: true });
        (data.lines || []).forEach(line => {
          const key = `${line.ts}|${line.source}|${line.message}`;
          if (seenActivity.has(key)) return;
          seenActivity.add(key);
          if (seenActivity.size > 200) seenActivity.clear();
          const lvl = line.level === "err" ? "err" : line.level === "ok" ? "ok" : line.level === "warn" ? "warn" : "info";
          termLog(lvl, line.source, line.message);
        });
      } catch (_) {}
    }

    function showError(msg) {
      const b = document.getElementById("err-banner");
      b.textContent = msg;
      b.classList.add("show");
      setTimeout(() => b.classList.remove("show"), 8000);
    }
    function hideError() { document.getElementById("err-banner").classList.remove("show"); }

    document.getElementById("btn-refresh").onclick = async () => {
      await loadUiConfig().catch(() => {});
      await load();
      termLog("info", "SYS", lang === "en" ? "List refreshed" : "Lista actualizada");
    };
    async function continueMaestroFlow() {
      if (!selectedCase || isRunning) return;
      const caseId = selectedCase.case_id;
      isRunning = true;
      document.getElementById("running-banner").textContent = t("continuingFlow");
      document.getElementById("running-banner").classList.add("show");
      document.querySelectorAll(".consult-btn").forEach(b => b.disabled = true);
      termLog("info", "MAESTRO", `${t("continueFlow")} · ${caseId.slice(0, 8)}…`);
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 300000);
        const r = await apiFetch(`/api/v1/cases/${encodeURIComponent(caseId)}/continue-flow`, {
          method: "POST",
          noLang: true,
          signal: ctrl.signal,
        });
        clearTimeout(timer);
        termLog("ok", "MAESTRO", r.flow_blocked
          ? (lang === "en" ? `BLOCKED · ${r.blocking_gate || "gate"}` : `BLOQUEADO · ${r.blocking_gate || "gate"}`)
          : t("continueOk") + ` · ${(r.stages_completed || []).join(" → ")}`);
        await openCase(caseId);
        await refreshCasesTable(true);
      } catch (e) {
        termLog("err", "MAESTRO", String(e.message));
        showError(String(e.message));
      } finally {
        isRunning = false;
        document.getElementById("running-banner").classList.remove("show");
        document.querySelectorAll(".consult-btn").forEach(b => b.disabled = false);
        if (selectedCase) renderDetail(normalizeCase(selectedCase));
      }
    }

    async function resetDemoPanel() {
      if (!confirm(t("resetConfirm"))) return;
      const typed = prompt(t("resetPrompt"));
      if ((typed || "").trim().toUpperCase() !== "RESET") return;
      try {
        const r = await apiFetch("/api/v1/demo/reset?confirm=RESET", { method: "POST", noLang: true });
        document.getElementById("terminal").innerHTML = "";
        selectedCase = null;
        document.getElementById("detail-content").style.display = "none";
        document.getElementById("detail-empty").style.display = "block";
        await load();
        termLog("ok", "SYS", `${t("resetOk")} (${r.cases_deleted || 0})`);
      } catch (e) {
        termLog("err", "SYS", String(e.message));
        showError(String(e.message));
      }
    }

    async function clearActivityLog() {
      document.getElementById("terminal").innerHTML = "";
      try {
        await apiFetch("/api/v1/activity/clear", { method: "POST", noLang: true, silent: true });
      } catch (_) {}
    }

    function bindHitlButtons() {
      const btnA = document.getElementById("btn-approve");
      const btnR = document.getElementById("btn-reject");
      const btnC = document.getElementById("btn-continue-flow");
      btnA.addEventListener("click", (ev) => { ev.preventDefault(); decide("approve"); });
      btnR.addEventListener("click", (ev) => { ev.preventDefault(); decide("reject"); });
      if (btnC) btnC.addEventListener("click", (ev) => { ev.preventDefault(); continueMaestroFlow(); });
    }
    bindHitlButtons();
    document.getElementById("btn-demo-agent").onclick = () => runAgentDemo();
    document.getElementById("btn-verify-all").onclick = () => verifyAllPlatform();
    document.getElementById("btn-demo-tests").onclick = () => runTestsDemo();
    document.getElementById("btn-demo-du").onclick = () => runDuDemo();
    document.getElementById("btn-demo-caseapp").onclick = () => openCaseAppDemo();
    document.getElementById("btn-clear-term").onclick = () => { clearActivityLog(); };
    const btnReset = document.getElementById("btn-reset-demo");
    if (btnReset) btnReset.onclick = () => { resetDemoPanel(); };
    document.getElementById("btn-lang").onclick = () => {
      lang = lang === "en" ? "es" : "en";
      localStorage.setItem("pcd-lang", lang);
      applyLang();
      load();
    };

    function startPendingPoll() {
      stopCasePoll();
      casePollTimer = setInterval(async () => {
        if (isDeciding || isRunning || !selectedCase || isFinalApproval(selectedCase.approval_status)) return;
        if (!canApprove(selectedCase)) return;
        try {
          const c = normalizeCase(await apiFetch(`/api/v1/cases/${encodeURIComponent(selectedCase.case_id)}`, { silent: true }));
          renderDetail(c);
        } catch (_) {}
      }, 5000);
    }

    applyLang();
    loadUiConfig().then(() => load());
    termLog("info", "SYS", lang === "en" ? "Panel ready — log top, detail below" : "Panel listo — log arriba, detalle abajo");
    setInterval(pollActivity, 4000);
    const urlCase = new URLSearchParams(window.location.search).get("case_id");
    if (urlCase) openCase(urlCase).then(() => startPendingPoll()).catch(() => {});
  </script>
</body>
</html>
